name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

concurrency:
  group: "ci-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

defaults:
  run:
    shell: bash

jobs:
  lint_and_typecheck:
    name: "Lint & Typecheck — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            path: mobile
          - service: backend
            path: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.7.0

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Verify pnpm installed
        run: pnpm -v

      - name: Install dependencies (service)
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f "pnpm-lock.yaml" ] || [ -f "${{ matrix.path }}/pnpm-lock.yaml" ]; then
            echo "Using frozen lockfile"
            pnpm install --frozen-lockfile --silent
          else
            echo "No pnpm-lock.yaml found — running standard install"
            pnpm install --silent
          fi

      - name: "Mobile: ESLint fix, Prettier write, ESLint check (npx)"
        if: ${{ matrix.path == 'mobile' }}
        working-directory: ${{ matrix.path }}
        run: |
          npx --yes eslint "src/**/*.{ts,tsx,js,jsx}" --ext .ts,.tsx --fix
          npx --yes prettier --write "src/**/*.{ts,tsx,js,jsx,json,css,md}"
          npx --yes eslint "src/**/*.{ts,tsx,js,jsx}" --ext .ts,.tsx --max-warnings=0

      - name: Prettier — format check
        working-directory: ${{ matrix.path }}
        run: pnpm --silent exec prettier --ignore-path .gitignore --check .

      - name: ESLint
        working-directory: ${{ matrix.path }}
        run: pnpm --silent exec eslint . --ext .ts,.tsx,.js,.jsx --max-warnings=0

      - name: TypeScript — typecheck
        working-directory: ${{ matrix.path }}
        run: pnpm --silent exec tsc --noEmit

  test:
    name: Tests — ${{ matrix.service }}
    needs: lint_and_typecheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            path: mobile
          - service: backend
            path: backend
    env:
      NODE_ENV: test
      BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
      TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.7.0

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Verify pnpm installed
        run: pnpm -v

      - name: Install dependencies (service)
        working-directory: ${{ matrix.path }}
        run: |
          if [ -f "pnpm-lock.yaml" ] || [ -f "${{ matrix.path }}/pnpm-lock.yaml" ]; then
            echo "Using frozen lockfile"
            pnpm install --frozen-lockfile --silent
          else
            echo "No pnpm-lock.yaml found — running standard install"
            pnpm install --silent
          fi

      - name: Run tests with coverage and enforce thresholds
        working-directory: ${{ matrix.path }}
        run: |
          pnpm --silent exec jest --ci --runInBand --coverage --coverageThreshold='{"global":{"branches":80,"functions":80,"lines":80,"statements":80}}'

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: "coverage-${{ matrix.service }}"
          path: ${{ matrix.path }}/coverage

  security_scan:
    name: Security & SAST
    needs: test
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - name: Checkout code (full fetch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.7.0

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Verify pnpm installed
        run: pnpm -v

      - name: Install all workspace dependencies
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "Using frozen lockfile at workspace root"
            pnpm -w install --frozen-lockfile --silent
          else
            echo "No pnpm-lock.yaml at workspace root — running standard workspace install"
            pnpm -w install --silent
          fi

      - name: Dependency audit (pnpm) — fail on high/critical
        run: pnpm -w audit --audit-level=high

      - name: Snyk vulnerability scan (optional)
        run: |
          if [ -z "${SNYK_TOKEN:-}" ]; then
            echo "SNYK_TOKEN not set — skipping Snyk scan"
            exit 0
          fi
          pnpm dlx snyk test --severity-threshold=high --all-projects --json

      - name: Detect secrets with Gitleaks
        run: |
          curl -sSL -o gitleaks https://github.com/zricethezav/gitleaks/releases/latest/download/gitleaks-linux-amd64
          chmod +x gitleaks
          ./gitleaks detect --source . --report-format json --redact || true

      - name: Initialize CodeQL database for JS/TS
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild for CodeQL
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v3